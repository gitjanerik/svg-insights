<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0f2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Full bleed background for maskable safe zone -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Centered logo within 80% safe zone -->
  <g transform="translate(96, 96)">
    <!-- Outer ring -->
    <circle cx="160" cy="160" r="150" fill="none" stroke="url(#stroke)" stroke-width="4" opacity="0.3"/>
    <!-- Peak/valley graph path -->
    <path d="M40 240 L80 100 L130 200 L190 50 L250 170 L290 100"
          fill="none" stroke="url(#stroke)" stroke-width="14"
          stroke-linecap="round" stroke-linejoin="round"
          filter="url(#glow)"/>
    <!-- Node dots -->
    <circle cx="80" cy="100" r="10" fill="#a78bfa"/>
    <circle cx="190" cy="50" r="10" fill="#38bdf8"/>
    <circle cx="290" cy="100" r="10" fill="#c084fc"/>
  </g>
</svg>
