  <rect width="512" height="512" fill="#1e293b"/>
  <!-- Sentrert logo i 80% safe zone -->
  <g transform="translate(96, 96)">
    <!-- Sirkel-ring i gul (subtilt) -->
    <circle cx="160" cy="160" r="148" fill="none" stroke="#facc15" stroke-width="4" opacity="0.5"/>
