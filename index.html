<h2 class="sr-only">Interaktivt SVG-diagramverktøy — søyle- og kakediagram med justerbare data</h2>

<style>
.sr-only{position:absolute;width:1px;height:1px;padding:0;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
#sliders{display:grid;gap:8px;margin-bottom:1.5rem}
.row{display:grid;grid-template-columns:90px 1fr 32px;align-items:center;gap:10px}
.lbl{font-size:13px;color:var(--color-text-secondary)}
.val{font-size:13px;font-weight:500;color:var(--color-text-primary);text-align:right}
.chart-wrap{margin-bottom:1.25rem}
.chart-title{font-size:12px;color:var(--color-text-secondary);margin-bottom:6px}
svg.chart{width:100%;display:block}
</style>

<div style="padding:1rem 0">
  <div id="sliders"></div>
  <div class="chart-wrap">
    <div class="chart-title">Søylediagram</div>
    <svg id="bar" class="chart" viewBox="0 0 520 220" role="img" aria-label="Søylediagram med månedlig data, oppdateres dynamisk"></svg>
  </div>
  <div class="chart-wrap">
    <div class="chart-title">Kakediagram</div>
    <svg id="pie" class="chart" viewBox="0 0 480 240" role="img" aria-label="Kakediagram med prosentfordeling, oppdateres dynamisk"></svg>
  </div>
</div>

<script>
const COLORS = ['#7F77DD','#1D9E75','#D85A30','#D4537E','#EF9F27'];
const data = [
  {label:'Januar', value:65},
  {label:'Februar', value:42},
  {label:'Mars', value:78},
  {label:'April', value:55},
  {label:'Mai', value:90},
];

const NS = 'http://www.w3.org/2000/svg';

function svgEl(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k, v));
  if (text !== undefined) e.textContent = text;
  return e;
}

function dark() {
  return matchMedia('(prefers-color-scheme: dark)').matches;
}

// Bygg sliders
const slidersEl = document.getElementById('sliders');
data.forEach((d, i) => {
  const row = document.createElement('div');
  row.className = 'row';

  const lbl = document.createElement('span');
  lbl.className = 'lbl';
  lbl.innerHTML = `<span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${COLORS[i]};margin-right:7px;vertical-align:2px"></span>${d.label}`;

  const inp = document.createElement('input');
  inp.type = 'range'; inp.min = 5; inp.max = 100; inp.value = d.value; inp.step = 1;

  const num = document.createElement('span');
  num.className = 'val';
  num.textContent = d.value;

  inp.oninput = e => {
    d.value = +e.target.value;
    num.textContent = d.value;
    render();
  };

  row.append(lbl, inp, num);
  slidersEl.appendChild(row);
});

function renderBar() {
  const svg = document.getElementById('bar');
  svg.innerHTML = '';

  const W = 520, H = 220;
  const pl = 44, pr = 16, pt = 24, pb = 36;
  const cW = W - pl - pr, cH = H - pt - pb;
  const maxV = Math.max(...data.map(d => d.value));
  const step = cW / data.length;
  const barW = Math.floor(step * 0.55);

  const textC = dark() ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.4)';
  const gridC = dark() ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';

  // Horisontale gridlinjer
  [0, 25, 50, 75, 100].forEach(v => {
    if (v > maxV * 1.1) return;
    const y = pt + cH - Math.min(v, maxV) / maxV * cH;
    svg.appendChild(svgEl('line', {x1:pl, y1:y, x2:W-pr, y2:y, stroke:gridC, 'stroke-width':0.5}));
    if (v > 0 && v <= maxV)
      svg.appendChild(svgEl('text', {x:pl-6, y:y+4, 'text-anchor':'end', 'font-size':11, fill:textC}, v));
  });

  // Baseline
  svg.appendChild(svgEl('line', {x1:pl, y1:pt+cH, x2:W-pr, y2:pt+cH, stroke:gridC, 'stroke-width':0.5}));

  // Søyler
  data.forEach((d, i) => {
    const bH = (d.value / maxV) * cH;
    const x = pl + i * step + (step - barW) / 2;
    const y = pt + cH - bH;

    // Søyle
    svg.appendChild(svgEl('rect', {x, y, width:barW, height:bH, fill:COLORS[i], rx:3}));
    // Verdi over søyle
    svg.appendChild(svgEl('text', {x:x+barW/2, y:y-5, 'text-anchor':'middle', 'font-size':11, 'font-weight':500, fill:COLORS[i]}, d.value));
    // X-etikett
    svg.appendChild(svgEl('text', {x:x+barW/2, y:H-pb+15, 'text-anchor':'middle', 'font-size':11, fill:textC}, d.label));
  });
}

function polarXY(cx, cy, r, a) {
  return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
}

function renderPie() {
  const svg = document.getElementById('pie');
  svg.innerHTML = '';

  const W = 480, H = 240;
  const cx = 112, cy = H / 2, r = 88;
  const total = data.reduce((s, d) => s + d.value, 0);
  const textC = dark() ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.55)';

  let a0 = -Math.PI / 2;

  data.forEach((d, i) => {
    const slice = (d.value / total) * 2 * Math.PI;
    const a1 = a0 + slice;
    const [x0, y0] = polarXY(cx, cy, r, a0);
    const [x1, y1] = polarXY(cx, cy, r, a1);
    const large = slice > Math.PI ? 1 : 0;

    // Sektor-path: M (senter) L (startpunkt) A (bue) Z (lukk)
    svg.appendChild(svgEl('path', {
      d:`M${cx},${cy} L${x0.toFixed(2)},${y0.toFixed(2)} A${r},${r} 0 ${large} 1 ${x1.toFixed(2)},${y1.toFixed(2)} Z`,
      fill:COLORS[i],
    }));

    // Prosentlabel inne i sektor
    if (slice > 0.3) {
      const [lx, ly] = polarXY(cx, cy, r * 0.63, a0 + slice / 2);
      const pct = Math.round((d.value / total) * 100);
      svg.appendChild(svgEl('text', {x:lx.toFixed(2), y:(ly+4).toFixed(2), 'text-anchor':'middle', 'font-size':11, 'font-weight':500, fill:'rgba(255,255,255,0.92)'}, `${pct}%`));
    }

    a0 = a1;
  });

  // Forklaring (legend)
  const lx = cx + r + 28;
  data.forEach((d, i) => {
    const ly = 30 + i * 38;
    const pct = Math.round((d.value / total) * 100);
    svg.appendChild(svgEl('rect', {x:lx, y:ly, width:10, height:10, rx:2, fill:COLORS[i]}));
    svg.appendChild(svgEl('text', {x:lx+16, y:ly+9, 'font-size':12, fill:textC}, d.label));
    svg.appendChild(svgEl('text', {x:W-10, y:ly+9, 'text-anchor':'end', 'font-size':12, 'font-weight':500, fill:COLORS[i]}, `${pct}%`));
  });
}

function render() {
  renderBar();
  renderPie();
}

render();
matchMedia('(prefers-color-scheme: dark)').addEventListener('change', render);
</script>
